[mypy]
python_version = 3.12
ignore_missing_imports = False
no_strict_optional = True
show_error_codes = True
warn_return_any = False
warn_unused_ignores = False
disallow_untyped_defs = False
check_untyped_defs = True
disallow_any_generics = False
exclude = (Projet_Oddo|frontend|node_modules|tests|__pycache__|\.venv|examples|scripts)
mypy_path = .
namespace_packages = True
explicit_package_bases = True

# Disable checks that generate too many false positives
# misc: generator type inference issues (sum() returns int not bool)
disable_error_code = var-annotated,assignment,attr-defined,misc

[mypy-backend.*]

[mypy-backend.extractors.*]

[mypy-backend.utils.*]
